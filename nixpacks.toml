providers = ["node"]

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = [
    "echo '--- CLEANING DIST ---'",
    "rm -rf backend/dist",
    "echo '--- BUILDING BACKEND ---'",
    "npm run build --workspace=@business-saas/api",
    "echo '--- BUILD COMPLETE ---'",
    "ls -la backend/dist"
]

[start]
cmd = "node backend/dist/main.js"
